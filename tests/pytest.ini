[pytest]
# AgentOS 测试框架配置
# Version: 0.1.0
# Last updated: 2026-03-22

# 测试发现路径
testpaths = .
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# 命令行选项
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    -p no:cacheprovider
    --color=yes
    --maxfail=20

# 标记定义
markers =
    unit: 单元测试，测试最小可测试单元
    integration: 集成测试，测试模块间协作
    e2e: 端到端测试，测试完整业务流程
    security: 安全测试，验证安全机制
    benchmark: 性能基准测试，验证性能指标
    contract: 合约测试，验证接口契约
    slow: 慢速测试，执行时间超过5秒
    smoke: 冒烟测试，验证基本功能可用
    regression: 回归测试，验证已修复的缺陷
    sdk: SDK测试，验证SDK接口
    api: API测试，验证REST API
    ffi: FFI测试，验证跨语言调用
    asyncio: 异步测试，验证异步功能

# 最小版本要求
minversion = 7.0

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 文件日志
log_file = logs/test_run.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(name)s - %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# 覆盖率配置（需要 pytest-cov）
# 运行: pytest --cov=agentos --cov-report=html --cov-report=term

# 超时配置（需要 pytest-timeout）
timeout = 300
timeout_method = thread

# 并行执行（需要 pytest-xdist）
# 运行: pytest -n auto

# 测试分组
xfail_strict = true

# 忽略警告
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
