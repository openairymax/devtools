# Pre-commit Hooks 配置
# 安装: pip install pre-commit && pre-commit install
# 运行: pre-commit run --all-files

repos:
  # 基础检查
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: trailing-whitespace
        args: ['--markdown-line-length=off']
      - id: end-of-file-fixer
        args: ['--enkoding=LF']
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=5000']
      - id: mixed-line-ending
        args: ['--fix=lf']
      - id: pretty-format-json
        args: ['--autofix', '--no-sort-keys']
      - id: debug-statements
      - id: detect-private-key

  # Python 代码格式化
  - repo: https://github.com/psf/black
    rev: 23.3.0
    hooks:
      - id: black
        language_version: python3
        args: ['--line-length=100']

  # Python import 排序
  - repo: https://github.com/pycqa/isort
    rev: 5.12.0
    hooks:
      - id: isort
        args: ['--profile=black', '--line-length=100']

  # Python 代码检查
  - repo: https://github.com/pycqa/flake8
    rev: 6.0.0
    hooks:
      - id: flake8
        args: ['--max-line-length=100', '--extend-ignore=E203,W503']
        files: ^tests/

  # Python 类型检查
  - repo: https://github.com/pycqa/mypy
    rev: 1.3.0
    hooks:
      - id: mypy
        additional_dependencies: [pytest]
        args: ['--ignore-missing-imports']
        files: ^tests/

  # C/C++ 代码格式化
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v16.0.0
    hooks:
      - id: clang-format
        files: ^tests/.*\.(c|h|cpp|hpp|cc|cxx)$
        args: ['--style=file']

  # Markdown 格式检查
  - repo: https://github.com/executablebooks/mdformat
    rev: 0.7.17
    hooks:
      - id: mdformat
        args: ['--number']
        additional_dependencies:
          - mdformat-tables
          - mdformat-front-matter

  # 安全性检查
  - repo: https://github.com/bandit/bandit
    rev: 1.7.5
    hooks:
      - id: bandit
        args: ['-r', '-x', 'tests/fixtures']
        files: ^tests/

  # JSON Schema 验证
  - repo: https://github.com/sirosen/check-jsonschema
    rev: 0.23.3
    hooks:
      - id: check-github-workflows

# 配置 pre-commit 本身
default_language_version:
  python: python3

default_stages:
  - pre-commit
  - commit
  - push

# 跳过某些检查的分支
shallow_clone: false

# 跳过某些文件的检查
exclude: |
  (?x)^(
    tests/fixtures/.* |
    .git/.* |
    build/.* |
    dist/.* |
    *.egg-info/.*
  )

# commit 时并行运行（需要更多资源）
# parallel: true
