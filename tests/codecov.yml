# Codecov 覆盖率报告配置
# 遵循 AgentRT 质量标准

codecov:
  require_ci_to_pass: true
  notify:
    wait_for_ci: true
  branch: main

coverage:
  precision: 2
  round: down
  range: "70...100"

  status:
    project:
      default:
        target: 80%
        threshold: 5%
        if_ci_failed: error
        informational: false
        only_pulls: false
      unit-tests:
        target: 85%
        paths:
          - "unit/"
      integration-tests:
        target: 75%
        paths:
          - "integration/"
      security-tests:
        target: 90%
        paths:
          - "security/"

    patch:
      default:
        target: 80%
        threshold: 5%
        base: auto
        if_ci_failed: error
        only_pulls: true

parsers:
  gcov:
    branch_detection:
      conditional: yes
      loop: yes
      method: no
      macro: no

comment:
  layout: "reach,diff,flags,files,footer"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true

  # 自定义评论模板
  after_n_builds: 1

ignore:
  - "**/test_*.py"
  - "**/tests/**"
  - "**/conftest.py"
  - "**/fixtures/**"
  - "**/__pycache__/**"
  - "**/*.pyc"
  - "**/setup.py"

fixes:
  - "before/::after/"

github_checks:
  annotations: true

# 覆盖率徽章配置
badge:
  path: docs/coverage.svg
