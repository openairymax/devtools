# AgentRT Helm Chart — 默认生产环境值
# 覆盖方式: helm install agentrt . -f values-prod.yaml --set global.env=production

global:
  env: production
  image:
    registry: ""
    repository: spharx/agentrt
    tag: "0.1.1"
    pullPolicy: IfNotPresent
    pullSecrets: []
  replicaCount: 1
  serviceAccount:
    create: true
    name: agentrt
    automount: true
    annotations: {}

# ===========================================================================
# 基础设施服务
# ===========================================================================
redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false
  master:
    persistence:
      enabled: true
      size: 8Gi

postgresql:
  enabled: true
  auth:
    username: agentrt
    password: ""         # 生产环境通过 k8s secret 注入
    database: agentrt
  primary:
    persistence:
      enabled: true
      size: 20Gi

# ===========================================================================
# 内核原子服务
# ===========================================================================
corekern:
  enabled: true
  replicaCount: 1
  image:
    repository: spharx/agentrt-corekern
    tag: "0.1.1"
  service:
    port: 9001
    type: ClusterIP
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  livenessProbe:
    httpGet:
      path: /healthz
      port: 9001
    initialDelaySeconds: 15
    periodSeconds: 10
  readinessProbe:
    httpGet:
      path: /healthz
      port: 9001
    initialDelaySeconds: 10
    periodSeconds: 5
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    capabilities:
      drop:
        - ALL

# ===========================================================================
# 核心原子服务
# ===========================================================================
coreloopthree:
  enabled: true
  replicaCount: 1
  image:
    repository: spharx/agentrt-coreloopthree
    tag: "0.1.1"
  service:
    port: 9002
    type: ClusterIP
  resources:
    requests:
      memory: "256Mi"
      cpu: "200m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    capabilities:
      drop:
        - ALL

taskflow:
  enabled: true
  replicaCount: 1
  image:
    repository: spharx/agentrt-taskflow
    tag: "0.1.1"
  service:
    port: 9003
    type: ClusterIP
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  livenessProbe:
    httpGet:
      path: /healthz
      port: 9003
    initialDelaySeconds: 15
    periodSeconds: 10
  readinessProbe:
    httpGet:
      path: /healthz
      port: 9003
    initialDelaySeconds: 10
    periodSeconds: 5
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    capabilities:
      drop:
        - ALL

memory:
  enabled: true
  replicaCount: 1
  image:
    repository: spharx/agentrt-memory
    tag: "0.1.1"
  service:
    port: 9004
    type: ClusterIP
  resources:
    requests:
      memory: "256Mi"
      cpu: "200m"
    limits:
      memory: "2Gi"
      cpu: "1000m"
  persistence:
    enabled: true
    size: 20Gi
  livenessProbe:
    httpGet:
      path: /healthz
      port: 9004
    initialDelaySeconds: 20
    periodSeconds: 10
  readinessProbe:
    httpGet:
      path: /healthz
      port: 9004
    initialDelaySeconds: 15
    periodSeconds: 5
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    capabilities:
      drop:
        - ALL

