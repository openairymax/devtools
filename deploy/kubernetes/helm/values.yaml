# ===========================================================================
# 网关层
# ===========================================================================
gateway_d:
  enabled: true
  replicaCount: 2
  image:
    repository: spharx/agentrt-gateway
    tag: "0.1.1"
  service:
    httpPort: 8080
    wsPort: 8081
    metricsPort: 9090
    type: LoadBalancer
  resources:
    requests:
      memory: "256Mi"
      cpu: "200m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80
  livenessProbe:
    httpGet:
      path: /healthz
      port: 8080
    initialDelaySeconds: 30
    periodSeconds: 10
  readinessProbe:
    httpGet:
      path: /healthz
      port: 8080
    initialDelaySeconds: 15
    periodSeconds: 5
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    capabilities:
      drop:
        - ALL

# ===========================================================================
# Ingress 配置
# ===========================================================================
ingress:
  enabled: false
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: agentrt.example.com
      paths:
        - path: /
          pathType: Prefix
          port: 8080
  tls:
    - secretName: agentrt-tls
      hosts:
        - agentrt.example.com

# ===========================================================================
# 监控
# ===========================================================================
prometheus:
  enabled: false
  server:
    persistentVolume:
      enabled: true
      size: 20Gi
  alertmanager:
    enabled: false

grafana:
  enabled: false
  adminPassword: ""
  persistence:
    enabled: true
    size: 2Gi
  dashboards:
    default:
      agentrt-overview:
        datasource: Prometheus

# ===========================================================================
# 全局配置
# ===========================================================================
agentosConfig:
  logLevel: INFO
  deployEnv: production
  mcpEnabled: true
  a2aEnabled: true
  openaiEnabled: true

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "9090"
  prometheus.io/path: "/metrics"

nodeSelector: {}
tolerations: []
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - agentrt
          topologyKey: kubernetes.io/hostname