{{- if .Values.gateway_d.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "agentrt.fullname" . }}-gateway-d
  labels:
    {{- include "agentrt.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway-d
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "agentrt.fullname" . }}-gateway-d
  minReplicas: {{ .Values.gateway_d.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.gateway_d.autoscaling.maxReplicas }}
  metrics:
    {{- if .Values.gateway_d.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.gateway_d.autoscaling.targetCPUUtilizationPercentage }}
    {{- end }}
    {{- if .Values.gateway_d.autoscaling.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.gateway_d.autoscaling.targetMemoryUtilizationPercentage }}
    {{- end }}
  {{- with .Values.gateway_d.autoscaling.behavior }}
  behavior:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}