{{- if and .Values.memory.enabled .Values.memory.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "agentrt.fullname" . }}-memory
  labels:
    {{- include "agentrt.labels" . | nindent 4 }}
    app.kubernetes.io/component: memory
  {{- with .Values.memory.persistence.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  accessModes:
    - {{ .Values.memory.persistence.accessMode | default "ReadWriteOnce" }}
  resources:
    requests:
      storage: {{ .Values.memory.persistence.size }}
  {{- if .Values.memory.persistence.storageClassName }}
  storageClassName: {{ .Values.memory.persistence.storageClassName }}
  {{- end }}
{{- end }}