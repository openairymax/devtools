{{/* ===== 网关层 ===== */}}
{{- if .Values.gateway_d.enabled }}
{{- $_ := set . "name" "gateway-d" }}
{{- $_ := set . "image" .Values.gateway_d.image }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agentrt.fullname" . }}-gateway-d
  labels:
    {{- include "agentrt.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway-d
spec:
  replicas: {{ .Values.gateway_d.replicaCount }}
  selector:
    matchLabels:
      {{- include "agentrt.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: gateway-d
  template:
    metadata:
      labels:
        {{- include "agentrt.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: gateway-d
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "agentrt.serviceAccountName" . }}
      containers:
        - name: gateway-d
          image: {{ include "agentrt.image" .Values.gateway_d }}
          imagePullPolicy: {{ .Values.gateway_d.image.pullPolicy | default .Values.global.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: ws
              containerPort: 8081
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: AGENTRT_SERVICE_NAME
              value: "gateway_d"
            - name: AGENTRT_HTTP_PORT
              value: "8080"
            - name: AGENTRT_WS_PORT
              value: "8081"
            - name: AGENTRT_METRICS_PORT
              value: "9090"
            - name: AGENTRT_LOG_LEVEL
              value: {{ .Values.agentosConfig.logLevel | quote }}
            - name: AGENTRT_DEPLOY_ENV
              value: {{ .Values.agentosConfig.deployEnv | quote }}
            - name: AGENTRT_COREKERN_HOST
              value: {{ include "agentrt.fullname" . }}-corekern
            - name: AGENTRT_CORELOOPTHREE_HOST
              value: {{ include "agentrt.fullname" . }}-coreloopthree
            - name: AGENTRT_LLM_HOST
              value: {{ include "agentrt.fullname" . }}-llm-d
            - name: AGENTRT_TOOL_HOST
              value: {{ include "agentrt.fullname" . }}-tool-d
            - name: AGENTRT_MARKET_HOST
              value: {{ include "agentrt.fullname" . }}-market-d
            - name: AGENTRT_MEMORY_HOST
              value: {{ include "agentrt.fullname" . }}-memory
            - name: AGENTRT_CHANNEL_HOST
              value: {{ include "agentrt.fullname" . }}-channel-d
            - name: AGENTRT_MONIT_HOST
              value: {{ include "agentrt.fullname" . }}-monit-d
            - name: AGENTRT_REDIS_HOST
              value: {{ .Release.Name }}-redis-master
            - name: AGENTRT_POSTGRES_HOST
              value: {{ .Release.Name }}-postgresql
            - name: AGENTRT_MCP_ENABLED
              value: {{ .Values.agentosConfig.mcpEnabled | quote }}
            - name: AGENTRT_A2A_ENABLED
              value: {{ .Values.agentosConfig.a2aEnabled | quote }}
            - name: AGENTRT_OPENAI_ENABLED
              value: {{ .Values.agentosConfig.openaiEnabled | quote }}
          envFrom:
            - configMapRef:
                name: {{ include "agentrt.fullname" . }}-config
          {{- with .Values.gateway_d.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 5
          securityContext:
            {{- toYaml .Values.gateway_d.securityContext | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
{{- end }}