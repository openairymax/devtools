{{/* Gateway: special case with ws port */}}
{{- if .Values.gateway_d.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "agentrt.fullname" . }}-gateway-d
  labels:
    {{- include "agentrt.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway-d
spec:
  type: {{ .Values.gateway_d.service.type }}
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
    - port: 8081
      targetPort: ws
      protocol: TCP
      name: ws
    - port: 9090
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    {{- include "agentrt.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: gateway-d
{{- end }}