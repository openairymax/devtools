apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agentrt.fullname" . }}-config
  labels:
    {{- include "agentrt.labels" . | nindent 4 }}
data:
  agentrt.yaml: |
    # AgentRT Configuration — managed by Helm
    # ConfigMap: {{ include "agentrt.fullname" . }}-config
    agentos:
      version: "0.1.1"
      log_level: {{ .Values.agentosConfig.logLevel | quote }}
      deploy_env: {{ .Values.agentosConfig.deployEnv | quote }}

      corekern:
        host: {{ include "agentrt.fullname" . }}-corekern
        port: 9001

      coreloopthree:
        host: {{ include "agentrt.fullname" . }}-coreloopthree
        port: 9002

      taskflow:
        host: {{ include "agentrt.fullname" . }}-taskflow
        port: 9003

      memory:
        host: {{ include "agentrt.fullname" . }}-memory
        port: 9004

      daemons:
        channel:
          host: {{ include "agentrt.fullname" . }}-channel-d
          port: 9101
        monit:
          host: {{ include "agentrt.fullname" . }}-monit-d
          port: 9102
          metrics_port: 9902
        observe:
          host: {{ include "agentrt.fullname" . }}-observe-d
          port: 9103
        llm:
          host: {{ include "agentrt.fullname" . }}-llm-d
          port: 9201
        tool:
          host: {{ include "agentrt.fullname" . }}-tool-d
          port: 9202
        market:
          host: {{ include "agentrt.fullname" . }}-market-d
          port: 9203
        sched:
          host: {{ include "agentrt.fullname" . }}-sched-d
          port: 9204
        hook:
          host: {{ include "agentrt.fullname" . }}-hook-d
          port: 9301
        plugin:
          host: {{ include "agentrt.fullname" . }}-plugin-d
          port: 9302
        info:
          host: {{ include "agentrt.fullname" . }}-info-d
          port: 9303
        notify:
          host: {{ include "agentrt.fullname" . }}-notify-d
          port: 9304

      gateway:
        http_port: 8080
        ws_port: 8081
        metrics_port: 9090
        mcp_enabled: {{ .Values.agentosConfig.mcpEnabled }}
        a2a_enabled: {{ .Values.agentosConfig.a2aEnabled }}
        openai_enabled: {{ .Values.agentosConfig.openaiEnabled }}

      infra:
        redis:
          host: {{ .Release.Name }}-redis-master
          port: 6379
        postgres:
          host: {{ .Release.Name }}-postgresql
          port: 5432
          database: agentrt
          username: agentrt