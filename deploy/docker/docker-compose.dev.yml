# AgentRT Full Development Environment
# Version: 0.1.0
#
# 一键启动完整开发环境:
#   docker-compose up -d
#
# 包含服务:
#   - gateway: 多协议网关 (HTTP/WS/MCP/A2A/OpenAI)
#   - redis: 缓存与会话存储
#   - postgres: 持久化数据库
#   - prometheus: 指标收集
#   - grafana: 可视化仪表板
#   - jaeger: 分布式追踪

version: '3.8'

services:
  gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        BUILD_VERSION: ${BUILD_VERSION:-0.1.0}
        BUILD_DATE: ${BUILD_DATE:-2026-04-12}
      target: runtime
    image: ghcr.io/spharx/agentrt/gateway:${BUILD_VERSION:-latest}
    container_name: agentrt-gateway
    hostname: gateway
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:8080"
      - "${WS_PORT:-8081}:8081"
      - "${METRICS_PORT:-9090}:9090"
    environment:
      - AGENTRT_LOG_LEVEL=${LOG_LEVEL:-INFO}
      - AGENTRT_SERVER_HOST=0.0.0.0
      - AGENTRT_HTTP_PORT=8080
      - AGENTRT_WS_PORT=8081
      - AGENTRT_METRICS_PORT=9090
      - AGENTRT_REDIS_HOST=redis
      - AGENTRT_REDIS_PORT=6379
      - AGENTRT_POSTGRES_HOST=postgres
      - AGENTRT_POSTGRES_PORT=5432
      - AGENTRT_POSTGRES_DB=agentos
      - AGENTRT_POSTGRES_USER=agentos
      - AGENTRT_POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - AGENTRT_JWT_SECRET=${JWT_SECRET}
      - AGENTRT_ENABLE_AUTH=${ENABLE_AUTH:-false}
      - AGENTRT_MCP_ENABLED=true
      - AGENTRT_A2A_ENABLED=true
      - AGENTRT_OPENAI_ENABLED=true
      - AGENTRT_TRACING_ENABLED=true
      - AGENTRT_TRACING_ENDPOINT=http://jaeger:4318/v1/traces
    volumes:
      - ../manager:/etc/agentrt/gateway:ro
      - gateway-logs:/var/log/agentos
      - gateway-run:/var/run/agentos
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - agentrt-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: agentrt-redis
    hostname: redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - agentrt-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  postgres:
    image: postgres:15-alpine
    container_name: agentrt-postgres
    hostname: postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      - POSTGRES_DB=agentos
      - POSTGRES_USER=agentos
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - agentrt-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentos"]
      interval: 10s
      timeout: 3s
      retries: 3

  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: agentrt-prometheus
    hostname: prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9091}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    networks:
      - agentrt-net
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:10.2.0
    container_name: agentrt-grafana
    hostname: grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana_agentrt_dashboard.json:/etc/grafana/provisioning/dashboards/agentos.json:ro
    depends_on:
      - prometheus
    networks:
      - agentrt-net
    profiles:
      - monitoring

  jaeger:
    image: jaegertracing/all-in-one:1.53
    container_name: agentrt-jaeger
    hostname: jaeger
    restart: unless-stopped
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686"
      - "${JAEGER_OTLP_PORT:-4318}:4318"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - agentrt-net
    profiles:
      - monitoring

volumes:
  gateway-logs:
  gateway-run:
  redis-data:
  postgres-data:
  prometheus-data:
  grafana-data:

networks:
  agentrt-net:
    driver: bridge
    name: agentrt-network
