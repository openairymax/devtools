# Prometheus Alert Rules for AgentRT gateway Module
# Version: 0.1.0

groups:
  # ==========================================================================
  # 可用性告警
  # ==========================================================================
  - name: agentrt-gateway.availability
    interval: 30s
    rules:
      # 实例宕机告警
      - alert: DynamicModuleDown
        expr: up{job="agentrt-gateway"} == 0
        for: 1m
        labels:
          severity: critical
          service: gateway
        annotations:
          summary: "gateway Module 实例宕机"
          description: "gateway Module 实例 {{ $labels.instance }} 已宕机超过 1 分钟"
      
      # 健康检查失败
      - alert: HealthCheckFailed
        expr: agentrt_health_status != 1
        for: 2m
        labels:
          severity: warning
          service: gateway
        annotations:
          summary: "健康检查失败"
          description: "实例 {{ $labels.instance }} 健康检查失败，状态码: {{ $value }}"

  # ==========================================================================
  # 性能告警
  # ==========================================================================
  - name: agentrt-gateway.performance
    interval: 30s
    rules:
      # 高延迟告警
      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
          service: gateway
        annotations:
          summary: "HTTP 请求延迟过高"
          description: "95% 分位延迟 {{ $value | humanizeDuration }}，超过 1 秒阈值"
      
      # 错误率过高
      - alert: HighErrorRate
        expr: rate(http_requests_failed_total[5m]) / rate(http_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
          service: gateway
        annotations:
          summary: "HTTP 错误率过高"
          description: "错误率 {{ $value | humanizePercentage }}，超过 5% 阈值"
      
      # 内存使用过高
      - alert: HighMemoryUsage
        expr: process_resident_memory_bytes / process_virtual_memory_bytes > 0.8
        for: 10m
        labels:
          severity: warning
          service: gateway
        annotations:
          summary: "内存使用率过高"
          description: "实例 {{ $labels.instance }} 内存使用率 {{ $value | humanizePercentage }}"
      
      # CPU 使用过高
      - alert: HighCPUUsage
        expr: rate(process_cpu_seconds_total[5m]) > 0.8
        for: 10m
        labels:
          severity: warning
          service: gateway
        annotations:
          summary: "CPU 使用率过高"
          description: "实例 {{ $labels.instance }} CPU 使用率持续过高"

  # ==========================================================================
  # 会话管理告警
  # ==========================================================================
  - name: agentrt-gateway.sessions
    interval: 30s
    rules:
      # 会话数过多
      - alert: TooManySessions
        expr: agentrt_session_count > 10000
        for: 5m
        labels:
          severity: warning
          service: gateway
        annotations:
          summary: "活跃会话数过多"
          description: "当前活跃会话数 {{ $value }}，可能需要扩容"
      
      # 会话创建失败率高
      - alert: SessionCreationFailure
        expr: rate(agentrt_session_creation_failed_total[5m]) > 10
        for: 5m
        labels:
          severity: warning
          service: gateway
        annotations:
          summary: "会话创建失败率高"
          description: "每分钟会话创建失败 {{ $value }} 次"
      
      # 会话清理过慢
      - alert: SessionCleanupSlow
        expr: rate(agentrt_session_cleanup_total[5m]) < 1 and agentrt_session_count > 1000
        for: 10m
        labels:
          severity: info
          service: gateway
        annotations:
          summary: "会话清理速度过慢"
          description: "会话清理速度 {{ $value }}/min，可能存在内存泄漏"

  # ==========================================================================
  # 连接管理告警
  # ==========================================================================
  - name: agentrt-gateway.connections
    interval: 30s
    rules:
      # 连接池耗尽
      - alert: ConnectionPoolExhausted
        expr: agentrt_connection_pool_available == 0
        for: 2m
        labels:
          severity: critical
          service: gateway
        annotations:
          summary: "连接池耗尽"
          description: "实例 {{ $labels.instance }} 连接池已耗尽，无法建立新连接"
      
      # WebSocket 连接数过多
      - alert: TooManyWebSocketConnections
        expr: agentrt_websocket_connections > 5000
        for: 5m
        labels:
          severity: warning
          service: gateway
        annotations:
          summary: "WebSocket 连接数过多"
          description: "当前 WebSocket 连接数 {{ $value }}，可能需要扩容"
      
      # 连接失败率高
      - alert: HighConnectionFailureRate
        expr: rate(agentrt_connection_failed_total[5m]) / rate(agentrt_connection_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
          service: gateway
        annotations:
          summary: "连接失败率高"
          description: "连接失败率 {{ $value | humanizePercentage }}，超过 10% 阈值"

  # ==========================================================================
  # 安全告警
  # ==========================================================================
  - name: agentrt-gateway.security
    interval: 30s
    rules:
      # 认证失败率高
      - alert: HighAuthenticationFailure
        expr: rate(agentrt_auth_failed_total[5m]) > 100
        for: 5m
        labels:
          severity: warning
          service: gateway
        annotations:
          summary: "认证失败率高"
          description: "每分钟认证失败 {{ $value }} 次，可能存在攻击"
      
      # 限流触发过多
      - alert: RateLimitTriggered
        expr: rate(agentrt_ratelimit_triggered_total[5m]) > 50
        for: 5m
        labels:
          severity: info
          service: gateway
        annotations:
          summary: "限流频繁触发"
          description: "每分钟限流触发 {{ $value }} 次，可能需要调整限流策略"
      
      # JWT 令牌过期过多
      - alert: JWTTokenExpired
        expr: rate(agentrt_jwt_expired_total[5m]) > 100
        for: 10m
        labels:
          severity: info
          service: gateway
        annotations:
          summary: "JWT 令牌过期频繁"
          description: "每分钟 JWT 令牌过期 {{ $value }} 次，可能需要调整过期时间"

  # ==========================================================================
  # 网关告警
  # ==========================================================================
  - name: agentrt-gateway.gateway
    interval: 30s
    rules:
      # HTTP 网关错误
      - alert: HTTPGatewayError
        expr: rate(agentrt_http_gateway_errors_total[5m]) > 10
        for: 5m
        labels:
          severity: warning
          service: gateway
        annotations:
          summary: "HTTP 网关错误频繁"
          description: "每分钟 HTTP 网关错误 {{ $value }} 次"
      
      # WebSocket 网关错误
      - alert: WebSocketGatewayError
        expr: rate(agentrt_websocket_gateway_errors_total[5m]) > 10
        for: 5m
        labels:
          severity: warning
          service: gateway
        annotations:
          summary: "WebSocket 网关错误频繁"
          description: "每分钟 WebSocket 网关错误 {{ $value }} 次"
      
      # 请求大小超限
      - alert: RequestSizeExceeded
        expr: rate(agentrt_request_size_exceeded_total[5m]) > 5
        for: 5m
        labels:
          severity: warning
          service: gateway
        annotations:
          summary: "请求大小超限频繁"
          description: "每分钟请求大小超限 {{ $value }} 次，可能存在异常请求"

  # ==========================================================================
  # 依赖服务告警
  # ==========================================================================
  - name: agentrt-gateway.dependencies
    interval: 30s
    rules:
      # Redis 连接失败
      - alert: RedisConnectionFailed
        expr: agentrt_redis_connection_status != 1
        for: 2m
        labels:
          severity: critical
          service: gateway
        annotations:
          summary: "Redis 连接失败"
          description: "无法连接到 Redis 服务"
      
      # Redis 延迟过高
      - alert: RedisHighLatency
        expr: histogram_quantile(0.95, rate(agentrt_redis_command_duration_seconds_bucket[5m])) > 0.1
        for: 5m
        labels:
          severity: warning
          service: gateway
        annotations:
          summary: "Redis 延迟过高"
          description: "Redis 95% 分位延迟 {{ $value | humanizeDuration }}"
