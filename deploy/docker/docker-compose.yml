# Docker Compose configuration for AgentRT gateway Module
# Version: 0.1.0
#
# 使用方法:
#   开发环境: docker-compose up -d
#   生产环境: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

version: '3.8'

services:
  # ==========================================================================
  # gateway Module 主服务
  # ==========================================================================
  gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        BUILD_VERSION: ${BUILD_VERSION:-0.1.0}
        BUILD_DATE: ${BUILD_DATE:-2026-03-24}
      target: runtime
    image: ghcr.io/spharx/agentrt/gateway:${BUILD_VERSION:-latest}
    container_name: agentrt-gateway
    hostname: gateway
    restart: unless-stopped
    
    # 端口映射
    ports:
      - "${HTTP_PORT:-8080}:8080"
      - "${WS_PORT:-8081}:8081"
      - "${METRICS_PORT:-9090}:9090"
    
    # 环境变量
    environment:
      - AGENTRT_LOG_LEVEL=${LOG_LEVEL:-INFO}
      - AGENTRT_SERVER_HOST=0.0.0.0
      - AGENTRT_HTTP_PORT=8080
      - AGENTRT_WS_PORT=8081
      - AGENTRT_METRICS_PORT=9090
      - AGENTRT_REDIS_HOST=redis
      - AGENTRT_REDIS_PORT=6379
      - AGENTRT_JWT_SECRET=${JWT_SECRET}
      - AGENTRT_ENABLE_AUTH=${ENABLE_AUTH:-true}
    
    # 配置文件挂载
    volumes:
      - ../manager:/etc/agentrt/gateway:ro
      - gateway-logs:/var/log/agentos
      - gateway-run:/var/run/agentos
    
    # 依赖服务
    depends_on:
      redis:
        condition: service_healthy
    
    # 健康检查
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 128M
    
    # 网络配置
    networks:
      - agentrt-network
    
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==========================================================================
  # Redis 缓存服务
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: agentrt-redis
    hostname: redis
    restart: unless-stopped
    
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    
    ports:
      - "${REDIS_PORT:-6379}:6379"
    
    volumes:
      - redis-data:/data
    
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 64M
    
    networks:
      - agentrt-network
    
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ==========================================================================
  # Prometheus 监控服务
  # ==========================================================================
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: agentrt-prometheus
    hostname: prometheus
    restart: unless-stopped
    
    command:
      - '--manager.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    
    ports:
      - "${PROMETHEUS_PORT:-9091}:9090"
    
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    
    networks:
      - agentrt-network
    
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ==========================================================================
  # Grafana 可视化服务
  # ==========================================================================
  grafana:
    image: grafana/grafana:10.2.0
    container_name: agentrt-grafana
    hostname: grafana
    restart: unless-stopped
    
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
    
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/datasources:/etc/grafana/provisioning/datasources:ro
    
    depends_on:
      - prometheus
    
    networks:
      - agentrt-network
    
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

# ==========================================================================
# 网络配置
# ==========================================================================
networks:
  agentrt-network:
    driver: bridge
    ipam:
      manager:
        - subnet: 172.28.0.0/16

# ==========================================================================
# 数据卷配置
# ==========================================================================
volumes:
  gateway-logs:
    driver: local
  gateway-run:
    driver: local
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
