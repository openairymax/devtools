# docker-compose.test.yml — AgentRT 集成测试环境（16 服务一键启动）
# P1.17: docker-compose 集成测试环境搭建
#
# 使用方法:
#   启动全部服务:  docker-compose -f deploy/docker/docker-compose.test.yml up -d
#   查看状态:      docker-compose -f deploy/docker/docker-compose.test.yml ps
#   查看日志:      docker-compose -f deploy/docker/docker-compose.test.yml logs -f
#   停止全部服务:  docker-compose -f deploy/docker/docker-compose.test.yml down -v
#
# 服务启动顺序（依赖图 DAG）:
#   Layer 0 (基础设施): redis, postgres
#   Layer 1 (内核原子): corekern
#   Layer 2 (核心原子): coreloopthree, taskflow, memory
#   Layer 3 (基础 daemon): channel_d, monit_d, observe_d
#   Layer 4 (业务 daemon): llm_d, tool_d, market_d, sched_d
#   Layer 5 (扩展 daemon): hook_d, plugin_d, info_d, notify_d
#   Layer 6 (网关层):    gateway_d

version: '3.8'

x-common-env: &common-env
  AGENTRT_TEST_MODE: "1"
  AGENTRT_LOG_LEVEL: "${LOG_LEVEL:-DEBUG}"
  AGENTRT_CONFIG_PATH: "/etc/agentrt/agentrt.yaml"
  AGENTRT_DEPLOY_ENV: "test"

x-common-daemon: &common-daemon
  build:
    context: ../..
    dockerfile: deploy/docker/Dockerfile
    target: runtime
  restart: "no"
  networks:
    - agentrt-test-net
  environment:
    <<: *common-env
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "1"

services:
  # ========================================================================
  # Layer 0: 基础设施服务
  # ========================================================================

  redis:
    image: redis:7-alpine
    container_name: agentrt-test-redis
    hostname: redis
    restart: "no"
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "${TEST_REDIS_PORT:-16379}:6379"
    networks:
      - agentrt-test-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  postgres:
    image: postgres:15-alpine
    container_name: agentrt-test-postgres
    hostname: postgres
    restart: "no"
    ports:
      - "${TEST_POSTGRES_PORT:-15432}:5432"
    environment:
      - POSTGRES_DB=agentrt_test
      - POSTGRES_USER=agentrt
      - POSTGRES_PASSWORD=agentrt_test
    networks:
      - agentrt-test-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentrt -d agentrt_test"]
      interval: 5s
      timeout: 3s
      retries: 3

  # ========================================================================
  # Layer 1: 内核原子服务
  # ========================================================================

  corekern:
    <<: *common-daemon
    container_name: agentrt-test-corekern
    hostname: corekern
    ports:
      - "${TEST_COREKERN_PORT:-19001}:9001"
    environment:
      <<: *common-env
      AGENTRT_SERVICE_NAME: corekern
      AGENTRT_SERVICE_PORT: "9001"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9001/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s

  # ========================================================================
  # Layer 2: 核心原子服务
  # ========================================================================

  coreloopthree:
    <<: *common-daemon
    container_name: agentrt-test-coreloopthree
    hostname: coreloopthree
    ports:
      - "${TEST_CL3_PORT:-19002}:9002"
    environment:
      AGENTRT_SERVICE_NAME: coreloopthree
      AGENTRT_SERVICE_PORT: "9002"
      AGENTRT_COREKERN_HOST: corekern
      AGENTRT_COREKERN_PORT: "9001"
    depends_on:
      corekern:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9002/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s

  taskflow:
    <<: *common-daemon
    container_name: agentrt-test-taskflow
    hostname: taskflow
    ports:
      - "${TEST_TASKFLOW_PORT:-19003}:9003"
    environment:
      AGENTRT_SERVICE_NAME: taskflow
      AGENTRT_SERVICE_PORT: "9003"
      AGENTRT_COREKERN_HOST: corekern
    depends_on:
      corekern:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9003/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s

  memory:
    <<: *common-daemon
    container_name: agentrt-test-memory
    hostname: memory
    ports:
      - "${TEST_MEMORY_PORT:-19004}:9004"
    environment:
      AGENTRT_SERVICE_NAME: memory
      AGENTRT_SERVICE_PORT: "9004"
      AGENTRT_COREKERN_HOST: corekern
      AGENTRT_POSTGRES_HOST: postgres
      AGENTRT_POSTGRES_PORT: "5432"
    depends_on:
      corekern:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9004/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s

  # ========================================================================
  # Layer 3: 基础 daemon 服务
  # ========================================================================

  channel_d:
    <<: *common-daemon
    container_name: agentrt-test-channel
    hostname: channel-d
    ports:
      - "${TEST_CHANNEL_PORT:-19101}:9101"
    environment:
      AGENTRT_SERVICE_NAME: channel_d
      AGENTRT_SERVICE_PORT: "9101"
      AGENTRT_COREKERN_HOST: corekern
    depends_on:
      corekern:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9101/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  monit_d:
    <<: *common-daemon
    container_name: agentrt-test-monit
    hostname: monit-d
    ports:
      - "${TEST_MONIT_PORT:-19102}:9102"
      - "${TEST_MONIT_METRICS_PORT:-19902}:9902"
    environment:
      AGENTRT_SERVICE_NAME: monit_d
      AGENTRT_SERVICE_PORT: "9102"
      AGENTRT_METRICS_PORT: "9902"
      AGENTRT_COREKERN_HOST: corekern
    depends_on:
      corekern:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9102/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  observe_d:
    <<: *common-daemon
    container_name: agentrt-test-observe
    hostname: observe-d
    ports:
      - "${TEST_OBSERVE_PORT:-19103}:9103"
    environment:
      AGENTRT_SERVICE_NAME: observe_d
      AGENTRT_SERVICE_PORT: "9103"
      AGENTRT_COREKERN_HOST: corekern
      AGENTRT_MONIT_HOST: monit-d
    depends_on:
      corekern:
        condition: service_healthy
      monit_d:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9103/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  # ========================================================================
  # Layer 4: 业务 daemon 服务
  # ========================================================================

  llm_d:
    <<: *common-daemon
    container_name: agentrt-test-llm
    hostname: llm-d
    ports:
      - "${TEST_LLM_PORT:-19201}:9201"
    environment:
      AGENTRT_SERVICE_NAME: llm_d
      AGENTRT_SERVICE_PORT: "9201"
      AGENTRT_COREKERN_HOST: corekern
      AGENTRT_CORELOOPTHREE_HOST: coreloopthree
      AGENTRT_CHANNEL_HOST: channel-d
    depends_on:
      corekern:
        condition: service_healthy
      coreloopthree:
        condition: service_healthy
      channel_d:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9201/healthz"]
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 15s

  tool_d:
    <<: *common-daemon
    container_name: agentrt-test-tool
    hostname: tool-d
    ports:
      - "${TEST_TOOL_PORT:-19202}:9202"
    environment:
      AGENTRT_SERVICE_NAME: tool_d
      AGENTRT_SERVICE_PORT: "9202"
      AGENTRT_COREKERN_HOST: corekern
      AGENTRT_CORELOOPTHREE_HOST: coreloopthree
      AGENTRT_CHANNEL_HOST: channel-d
    depends_on:
      corekern:
        condition: service_healthy
      coreloopthree:
        condition: service_healthy
      channel_d:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9202/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  market_d:
    <<: *common-daemon
    container_name: agentrt-test-market
    hostname: market-d
    ports:
      - "${TEST_MARKET_PORT:-19203}:9203"
    environment:
      AGENTRT_SERVICE_NAME: market_d
      AGENTRT_SERVICE_PORT: "9203"
      AGENTRT_COREKERN_HOST: corekern
      AGENTRT_CHANNEL_HOST: channel-d
      AGENTRT_REDIS_HOST: redis
    depends_on:
      corekern:
        condition: service_healthy
      channel_d:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9203/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  sched_d:
    <<: *common-daemon
    container_name: agentrt-test-sched
    hostname: sched-d
    ports:
      - "${TEST_SCHED_PORT:-19204}:9204"
    environment:
      AGENTRT_SERVICE_NAME: sched_d
      AGENTRT_SERVICE_PORT: "9204"
      AGENTRT_COREKERN_HOST: corekern
      AGENTRT_CHANNEL_HOST: channel-d
    depends_on:
      corekern:
        condition: service_healthy
      channel_d:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9204/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ========================================================================
  # Layer 5: 扩展 daemon 服务
  # ========================================================================

  hook_d:
    <<: *common-daemon
    container_name: agentrt-test-hook
    hostname: hook-d
    ports:
      - "${TEST_HOOK_PORT:-19301}:9301"
    environment:
      AGENTRT_SERVICE_NAME: hook_d
      AGENTRT_SERVICE_PORT: "9301"
      AGENTRT_COREKERN_HOST: corekern
      AGENTRT_CORELOOPTHREE_HOST: coreloopthree
      AGENTRT_CHANNEL_HOST: channel-d
    depends_on:
      corekern:
        condition: service_healthy
      coreloopthree:
        condition: service_healthy
      channel_d:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9301/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  plugin_d:
    <<: *common-daemon
    container_name: agentrt-test-plugin
    hostname: plugin-d
    ports:
      - "${TEST_PLUGIN_PORT:-19302}:9302"
    environment:
      AGENTRT_SERVICE_NAME: plugin_d
      AGENTRT_SERVICE_PORT: "9302"
      AGENTRT_COREKERN_HOST: corekern
      AGENTRT_CHANNEL_HOST: channel-d
    depends_on:
      corekern:
        condition: service_healthy
      channel_d:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9302/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  info_d:
    <<: *common-daemon
    container_name: agentrt-test-info
    hostname: info-d
    ports:
      - "${TEST_INFO_PORT:-19303}:9303"
    environment:
      AGENTRT_SERVICE_NAME: info_d
      AGENTRT_SERVICE_PORT: "9303"
      AGENTRT_COREKERN_HOST: corekern
      AGENTRT_CHANNEL_HOST: channel-d
    depends_on:
      corekern:
        condition: service_healthy
      channel_d:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9303/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  notify_d:
    <<: *common-daemon
    container_name: agentrt-test-notify
    hostname: notify-d
    ports:
      - "${TEST_NOTIFY_PORT:-19304}:9304"
    environment:
      AGENTRT_SERVICE_NAME: notify_d
      AGENTRT_SERVICE_PORT: "9304"
      AGENTRT_COREKERN_HOST: corekern
      AGENTRT_CHANNEL_HOST: channel-d
    depends_on:
      corekern:
        condition: service_healthy
      channel_d:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9304/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  # ========================================================================
  # Layer 6: 网关层
  # ========================================================================

  gateway_d:
    <<: *common-daemon
    container_name: agentrt-test-gateway
    hostname: gateway-d
    ports:
      - "${TEST_GATEWAY_HTTP_PORT:-8080}:8080"
      - "${TEST_GATEWAY_WS_PORT:-8081}:8081"
      - "${TEST_GATEWAY_METRICS_PORT:-9090}:9090"
    environment:
      AGENTRT_SERVICE_NAME: gateway_d
      AGENTRT_HTTP_PORT: "8080"
      AGENTRT_WS_PORT: "8081"
      AGENTRT_METRICS_PORT: "9090"
      AGENTRT_COREKERN_HOST: corekern
      AGENTRT_CORELOOPTHREE_HOST: coreloopthree
      AGENTRT_LLM_HOST: llm-d
      AGENTRT_TOOL_HOST: tool-d
      AGENTRT_MARKET_HOST: market-d
      AGENTRT_MEMORY_HOST: memory
      AGENTRT_CHANNEL_HOST: channel-d
      AGENTRT_MONIT_HOST: monit-d
      AGENTRT_REDIS_HOST: redis
      AGENTRT_POSTGRES_HOST: postgres
      AGENTRT_CUPOLAS_HOST: corekern
      AGENTRT_SERVICE_DISCOVERY_HOST: channel-d
      AGENTRT_MCP_ENABLED: "true"
      AGENTRT_A2A_ENABLED: "true"
      AGENTRT_OPENAI_ENABLED: "true"
    depends_on:
      corekern:
        condition: service_healthy
      coreloopthree:
        condition: service_healthy
      llm_d:
        condition: service_healthy
      tool_d:
        condition: service_healthy
      market_d:
        condition: service_healthy
      memory:
        condition: service_healthy
      channel_d:
        condition: service_healthy
      monit_d:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ========================================================================
  # 集成测试运行器
  # ========================================================================

  test-runner:
    image: alpine:3.19
    container_name: agentrt-test-runner
    hostname: test-runner
    depends_on:
      gateway_d:
        condition: service_healthy
    networks:
      - agentrt-test-net
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "=== AgentRT Integration Test Runner ==="
        echo "Waiting for all services to be healthy..."
        sleep 5
        echo ""
        echo "=== Health Check Results ==="
        for svc in gateway-d:8080 llm-d:9201 tool-d:9202 market-d:9203 \
                   sched-d:9204 hook-d:9301 plugin-d:9302 info-d:9303 \
                   notify-d:9304 channel-d:9101 monit-d:9102 observe-d:9103 \
                   corekern:9001 coreloopthree:9002 taskflow:9003 memory:9004; do
          host="$${svc%%:*}"
          port="$${svc##*:}"
          if wget -qO- --timeout=3 "http://$${host}:$${port}/healthz" 2>/dev/null; then
            echo "[PASS] $$host:$$port"
          else
            echo "[FAIL] $$host:$$port"
          fi
        done
        echo ""
        echo "=== Gateway Protocol Tests ==="
        # Test JSON-RPC endpoint
        if curl -s -X POST http://gateway-d:8080/ \
          -H "Content-Type: application/json" \
          -d '{"jsonrpc":"2.0","method":"ping","id":1}' 2>/dev/null; then
          echo "[PASS] JSON-RPC endpoint"
        else
          echo "[INFO] JSON-RPC endpoint (may not respond to ping)"
        fi
        # Test health endpoint
        if curl -s http://gateway-d:8080/healthz 2>/dev/null; then
          echo "[PASS] Health endpoint"
        fi
        # Test metrics endpoint
        METRICS=$(curl -s http://gateway-d:9090/metrics 2>/dev/null || echo "")
        if echo "$$METRICS" | grep -q "agentrt_"; then
          echo "[PASS] Metrics endpoint (agentrt_ metrics found)"
        elif [ -n "$$METRICS" ]; then
          echo "[WARN] Metrics endpoint responded but no agentrt_ metrics"
        else
          echo "[INFO] Metrics endpoint (not yet exposing metrics)"
        fi
        echo ""
        echo "=== Integration Test Complete ==="
    profiles:
      - test

  # ========================================================================
  # Prometheus 监控（测试模式）
  # ========================================================================
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: agentrt-test-prometheus
    hostname: prometheus
    restart: "no"
    ports:
      - "${TEST_PROMETHEUS_PORT:-19090}:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=1d'
      - '--web.enable-lifecycle'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - agentrt-test-net
    profiles:
      - monitoring

# ========================================================================
# 网络配置
# ========================================================================
networks:
  agentrt-test-net:
    driver: bridge
    name: agentrt-test-network
    ipam:
      config:
        - subnet: 172.29.0.0/16

# ========================================================================
# 数据卷配置
# ========================================================================
volumes:
  redis-test-data:
  postgres-test-data: